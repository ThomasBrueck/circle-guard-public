apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-notification-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-notification-service
  template:
    metadata:
      labels:
        app: circleguard-notification-service
    spec:
      containers:
      - name: circleguard-notification-service
        image: circle-guard/circleguard-notification-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "dev"
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-notification-service
  namespace: dev
spec:
  selector:
    app: circleguard-notification-service
  ports:
  - port: 80
    targetPort: 8082
